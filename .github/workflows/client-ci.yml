name: Client CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ✅ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: ✅ Install dependencies
        working-directory: ./client
        run: npm install

      - name: ✅ Build React app
        working-directory: ./client
        run: npm run build
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}

      - name: ✅ Verify build
        working-directory: ./client
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful!"
            ls -la dist/
          else
            echo "❌ Build failed!"
            exit 1
          fi

      # Vercel auto-deploys via GitHub integration  
      - name: ✅ CI Complete
        run: echo "✅ Build verified! Vercel will auto-deploy."