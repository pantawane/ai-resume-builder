name: Server CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ✅ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: ✅ Install dependencies
        working-directory: ./server
        run: npm install

      - name: ✅ Check syntax
        working-directory: ./server
        run: node --check server.js

      - name: ✅ Security audit
        working-directory: ./server
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: ✅ CI Complete
        run: echo "✅ All checks passed! Vercel will auto-deploy."